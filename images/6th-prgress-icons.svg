<svg width="237" height="52" viewBox="0 0 237 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .step-fill {
      fill: #c6d9d5;
    }

    .step-fill.muted {
      fill: #c9d7d3;
      fill-opacity: .45;
    }

    .step-inner {
      fill: #fff;
      fill-opacity: .26;
    }

    .ring-base {
      fill: none;
      stroke: rgba(255, 255, 255, .55);
      stroke-width: 3.2;
    }

    .ring {
      fill: none;
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-dasharray: 132;
      stroke-dashoffset: 132;
      transform-box: fill-box;
      transform-origin: center;
      animation: drawRing 2.4s ease-in-out infinite;
    }

    .step:nth-of-type(2) .ring {
      animation-delay: .16s;
    }

    .step:nth-of-type(3) .ring {
      animation-delay: .32s;
    }

    .step:nth-of-type(4) .ring {
      animation-delay: .48s;
    }

    .step:nth-of-type(5) .ring {
      animation-delay: .64s;
    }

    .icon-slot {
      color: #309884;
    }

    @keyframes drawRing {
      0% {
        stroke-dashoffset: 132;
      }

      48%,
      78% {
        stroke-dashoffset: 0;
      }

      100% {
        stroke-dashoffset: -132;
      }
    }
  </style>

  <defs>
    <linearGradient id="ringGradient1" x1="4" y1="7" x2="48" y2="45" gradientUnits="userSpaceOnUse">
      <stop stop-color="#23CEA7" />
      <stop offset="1" stop-color="#C0E421" />
    </linearGradient>
    <linearGradient id="ringGradient2" x1="50" y1="7" x2="94" y2="45" gradientUnits="userSpaceOnUse">
      <stop stop-color="#23CEA7" />
      <stop offset="1" stop-color="#C0E421" />
    </linearGradient>
    <linearGradient id="ringGradient3" x1="96" y1="7" x2="140" y2="45" gradientUnits="userSpaceOnUse">
      <stop stop-color="#23CEA7" />
      <stop offset="1" stop-color="#C0E421" />
    </linearGradient>
    <linearGradient id="ringGradient4" x1="142" y1="7" x2="186" y2="45" gradientUnits="userSpaceOnUse">
      <stop stop-color="#23CEA7" />
      <stop offset="1" stop-color="#C0E421" />
    </linearGradient>
    <linearGradient id="ringGradient5" x1="188" y1="7" x2="232" y2="45" gradientUnits="userSpaceOnUse">
      <stop stop-color="#23CEA7" />
      <stop offset="1" stop-color="#C0E421" />
    </linearGradient>
  </defs>

  <g class="step">
    <circle class="step-fill" cx="26" cy="26" r="24" />
    <circle class="step-inner" cx="26" cy="26" r="19" />
    <circle class="ring-base" cx="26" cy="26" r="21" />
    <circle class="ring" cx="26" cy="26" r="21" stroke="url(#ringGradient1)" />
    <g id="icon-1" class="icon-slot" transform="translate(26 26)">
      <!-- Add icon 1 here, centered around 0,0. Suggested size: 16x16. -->
    </g>
  </g>

  <g class="step">
    <circle class="step-fill" cx="72.25" cy="26" r="24" />
    <circle class="step-inner" cx="72.25" cy="26" r="19" />
    <circle class="ring-base" cx="72.25" cy="26" r="21" />
    <circle class="ring" cx="72.25" cy="26" r="21" stroke="url(#ringGradient2)" />
    <g id="icon-2" class="icon-slot" transform="translate(72.25 26)">
      <!-- Add icon 2 here, centered around 0,0. Suggested size: 16x16. -->
    </g>
  </g>

  <g class="step">
    <circle class="step-fill" cx="118.5" cy="26" r="24" />
    <circle class="step-inner" cx="118.5" cy="26" r="19" />
    <circle class="ring-base" cx="118.5" cy="26" r="21" />
    <circle class="ring" cx="118.5" cy="26" r="21" stroke="url(#ringGradient3)" />
    <g id="icon-3" class="icon-slot" transform="translate(118.5 26)">
      <!-- Add icon 3 here, centered around 0,0. Suggested size: 16x16. -->
    </g>
  </g>

  <g class="step">
    <circle class="step-fill" cx="164.75" cy="26" r="24" />
    <circle class="step-inner" cx="164.75" cy="26" r="19" />
    <circle class="ring-base" cx="164.75" cy="26" r="21" />
    <circle class="ring" cx="164.75" cy="26" r="21" stroke="url(#ringGradient4)" />
    <g id="icon-4" class="icon-slot" transform="translate(164.75 26)">
      <!-- Add icon 4 here, centered around 0,0. Suggested size: 16x16. -->
    </g>
  </g>

  <g class="step">
    <circle class="step-fill muted" cx="211" cy="26" r="24" />
    <circle class="step-inner" cx="211" cy="26" r="19" />
    <circle class="ring-base" cx="211" cy="26" r="21" />
    <circle class="ring" cx="211" cy="26" r="21" stroke="url(#ringGradient5)" />
    <g id="icon-5" class="icon-slot" transform="translate(211 26)">
      <!-- Add icon 5 here, centered around 0,0. Suggested size: 16x16. -->
    </g>
  </g>
</svg>
