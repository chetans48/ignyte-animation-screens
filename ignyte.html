<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>IGNYTE — Candidate Profiles</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap');
  :root{
    --bg:#06100c;
    --bg2:#0a1612;
    --red:#e23b4a;
    --green:#2f8f6a;
    --green-deep:#256b50;
    --green-soft:#7fc6a6;
    --green-glow:#a8e6c4;
    --lime:#c9f06a;
    --card:#ffffff;
    --card-2:#eef6f1;
    --skeleton:#e3e7e4;
    --skeleton-hi:#f4f7f5;
    --ink:#0e1b16;
    --muted:#9aa39e;
    --pill:#1b1b1b;
  }
  *{box-sizing:border-box}
  .stage{display:grid;place-items:center;padding:0;margin:0 auto;}

  .scene{
    position:relative;
    width:460px;
    height:400px;
    border:1.5px solid var(--red);
    border-radius:14px;
    background:
      radial-gradient(circle at 1.5px 1.5px, rgba(255,255,255,.05) 1px, transparent 1.4px) 0 0/14px 14px,
      linear-gradient(180deg,#06120d, #050d0a);
    padding:34px;
    box-shadow:0 0 24px rgba(226,59,74,.22);
  }

  /* Main candidate card */
  .card{
    position:absolute;
    background:linear-gradient(180deg,#ffffff 0%, #eaf3ec 100%);
    border-radius:14px;
    box-shadow:
      0 30px 60px rgba(0,0,0,.45),
      inset 0 1px 0 rgba(255,255,255,.9),
      inset 0 -1px 0 rgba(0,0,0,.04);
    color:var(--ink);
  }

  .main{
    left:34px; top:34px;
    width:62%;
    height:calc(100% - 68px);
    padding:34px 38px;
  }
  .brand{display:flex;align-items:center;gap:14px;margin-bottom:32px}
  .logo{
    width:46px;height:46px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #7fe0b3, #2f8f6a 70%);
    display:grid;place-items:center;
    box-shadow:inset 0 -3px 6px rgba(0,0,0,.15), 0 4px 10px rgba(47,143,106,.35);
  }
  .logo svg{width:22px;height:22px}
  .brand h1{font-size:22px;font-weight:800;letter-spacing:.18em;margin:0;color:#111}

  .panel{
    background:linear-gradient(180deg,#fbfdfb,#e7f1ea);
    border-radius:14px;
    padding:30px 32px 36px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.9),
      inset 0 0 0 1px rgba(255,255,255,.6),
      0 18px 40px -18px rgba(20,60,40,.35);
  }
  .panel h2{
    font-size:30px;font-weight:800;color:var(--green);
    margin:0 0 28px;
  }

  .row{display:flex;align-items:center;gap:20px;padding:14px 0}
  .row + .row{border-top:1px solid rgba(0,0,0,.08)}
  .avatar{
    width:60px;height:60px;border-radius:50%;
    background-size:cover;background-position:center;
    box-shadow:0 4px 10px rgba(0,0,0,.18), inset 0 0 0 2px #fff;
    flex-shrink:0;
  }
  .lines{flex:1;display:flex;flex-direction:column;gap:10px}
  .sk{
    height:14px;border-radius:8px;
    background:linear-gradient(90deg,var(--skeleton) 0%, var(--skeleton-hi) 50%, var(--skeleton) 100%);
    background-size:200% 100%;
    animation: shimmer 2.2s ease-in-out infinite;
  }
  .sk.w90{width:92%} .sk.w70{width:70%} .sk.w80{width:80%}
  @keyframes shimmer{
    0%{background-position:200% 0}
    100%{background-position:-200% 0}
  }

  .rate{display:flex;flex-direction:column;align-items:flex-start;gap:6px;min-width:120px}
  .stars{display:flex;gap:4px}
  .star{width:18px;height:18px;display:inline-block}
  .rate small{font-size:13px;color:#1b1b1b;font-weight:600}

  /* Notes panel */
  .notes{
    right:-20px; top:160px;
    width:48%;
    padding:26px 28px 28px;
  }
  .notes h3{color:var(--green);font-size:20px;font-weight:800;margin:0 0 18px}
  .note{
    background:linear-gradient(180deg,#fbfdfb,#eaf2ec);
    border-radius:12px;
    padding:14px 16px;
    display:flex;align-items:center;gap:14px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.7), 0 6px 14px -8px rgba(0,0,0,.18);
    margin-bottom:12px;
    position:relative;
  }
  .dot{width:10px;height:10px;border-radius:50%;background:#bcbfbc;flex-shrink:0}
  .nlines{flex:1;display:flex;flex-direction:column;gap:8px}
  .nlines .sk{height:10px;border-radius:6px}
  .copy{
    background:#1a1a1a;color:#fff;font-size:12px;font-weight:600;
    padding:6px 14px;border-radius:14px;
  }

  /* Process panel */
  .process{
    left:24%; bottom:-46px;
    width:70%;
    padding:22px 26px 24px;
  }
  .process h3{color:var(--green);font-size:20px;font-weight:800;margin:0 0 16px}
  .process .topRow{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .topRow .sk{width:90px;height:10px}
  .track{
    position:relative;height:30px;border-radius:8px;
    background:linear-gradient(90deg,#f1f5f2,#e3ece5);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.7);
    overflow:hidden;
  }
  .fill{
    position:absolute;left:0;top:0;bottom:0;
    background:linear-gradient(90deg, rgba(168,230,196,.2), var(--green) 70%, var(--green-deep));
    border-radius:8px;
    width:0;
    animation: fillBar 2.6s ease-out forwards;
  }
  @keyframes fillBar{ to{ width:72%; } }

  .nodes{
    position:relative;
    display:flex;justify-content:space-between;align-items:center;
    margin-top:-18px;padding:0 6px;
  }
  .node{
    width:18px;height:18px;border-radius:50%;
    background:var(--green);
    box-shadow:0 0 0 4px #ffffff, 0 4px 10px rgba(0,0,0,.18);
  }
  .node.last{
    width:34px;height:34px;
    background:radial-gradient(circle at 30% 30%, #d8f386, var(--lime));
    display:grid;place-items:center;
    box-shadow:0 0 0 4px #fff, 0 6px 14px rgba(0,0,0,.25);
  }
  .node.last svg{width:16px;height:16px}

  @media (max-width: 900px){
    .main,.notes,.process{position:relative;left:auto;right:auto;top:auto;bottom:auto;width:100%;height:auto;margin-bottom:18px}
  }
</style>
</head>
<body>
<div class="stage">
  <div class="scene">

    <!-- main candidate card -->
    <div class="card main">
      <div class="brand">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0e1b16" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 19 L12 5 L19 19"/><path d="M8.5 13 H15.5"/>
          </svg>
        </div>
        <h1>IGNYTE</h1>
      </div>

      <div class="panel">
        <h2>Candidate profiles</h2>

        <div class="row">
          <div class="avatar" style="background-image:url('https://images.unsplash.com/photo-1552058544-f2b08422138a?w=200&q=80')"></div>
          <div class="lines"><div class="sk w90"></div><div class="sk w70"></div></div>
          <div class="rate">
            <div class="stars">
              <svg class="star" viewBox="0 0 24 24" fill="#7fc66a"><polygon points="12,2 15,9 22,9 16.5,14 18.5,22 12,17.5 5.5,22 7.5,14 2,9 9,9"/></svg>
              <svg class="star" viewBox="0 0 24 24" fill="#7fc66a"><polygon points="12,2 15,9 22,9 16.5,14 18.5,22 12,17.5 5.5,22 7.5,14 2,9 9,9"/></svg>
              <svg class="star" viewBox="0 0 24 24" fill="#7fc66a"><polygon points="12,2 15,9 22,9 16.5,14 18.5,22 12,17.5 5.5,22 7.5,14 2,9 9,9"/></svg>
              <svg class="star" viewBox="0 0 24 24" fill="#7fc66a"><polygon points="12,2 15,9 22,9 16.5,14 18.5,22 12,17.5 5.5,22 7.5,14 2,9 9,9"/></svg>
              <svg class="star" viewBox="0 0 24 24" fill="none" stroke="#7fc66a" stroke-width="1.5"><polygon points="12,2 15,9 22,9 16.5,14 18.5,22 12,17.5 5.5,22 7.5,14 2,9 9,9"/></svg>
            </div>
            <small>4.8 Ratings</small>
          </div>
        </div>

        <div class="row">
          <div class="avatar" style="background-image:url('https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200&q=80')"></div>
          <div class="lines"><div class="sk w80"></div><div class="sk w70"></div></div>
          <div class="rate">
            <div class="stars">
              <svg class="star" viewBox="0 0 24 24" fill="#7fc66a"><polygon points="12,2 15,9 22,9 16.5,14 18.5,22 12,17.5 5.5,22 7.5,14 2,9 9,9"/></svg>
              <svg class="star" viewBox="0 0 24 24" fill="#7fc66a"><polygon points="12,2 15,9 22,9 16.5,14 18.5,22 12,17.5 5.5,22 7.5,14 2,9 9,9"/></svg>
              <svg class="star" viewBox="0 0 24 24" fill="#7fc66a"><polygon points="12,2 15,9 22,9 16.5,14 18.5,22 12,17.5 5.5,22 7.5,14 2,9 9,9"/></svg>
              <svg class="star" viewBox="0 0 24 24" fill="none" stroke="#7fc66a" stroke-width="1.5"><polygon points="12,2 15,9 22,9 16.5,14 18.5,22 12,17.5 5.5,22 7.5,14 2,9 9,9"/></svg>
              <svg class="star" viewBox="0 0 24 24" fill="none" stroke="#7fc66a" stroke-width="1.5"><polygon points="12,2 15,9 22,9 16.5,14 18.5,22 12,17.5 5.5,22 7.5,14 2,9 9,9"/></svg>
            </div>
            <small>3.0 Ratings</small>
          </div>
        </div>

        <div class="row">
          <div class="avatar" style="background-image:url('https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200&q=80')"></div>
          <div class="lines"><div class="sk w90"></div><div class="sk w70"></div></div>
          <div class="rate">
            <div class="stars">
              <svg class="star" viewBox="0 0 24 24" fill="#7fc66a"><polygon points="12,2 15,9 22,9 16.5,14 18.5,22 12,17.5 5.5,22 7.5,14 2,9 9,9"/></svg>
              <svg class="star" viewBox="0 0 24 24" fill="#7fc66a"><polygon points="12,2 15,9 22,9 16.5,14 18.5,22 12,17.5 5.5,22 7.5,14 2,9 9,9"/></svg>
              <svg class="star" viewBox="0 0 24 24" fill="#7fc66a"><polygon points="12,2 15,9 22,9 16.5,14 18.5,22 12,17.5 5.5,22 7.5,14 2,9 9,9"/></svg>
              <svg class="star" viewBox="0 0 24 24" fill="none" stroke="#7fc66a" stroke-width="1.5"><polygon points="12,2 15,9 22,9 16.5,14 18.5,22 12,17.5 5.5,22 7.5,14 2,9 9,9"/></svg>
              <svg class="star" viewBox="0 0 24 24" fill="none" stroke="#7fc66a" stroke-width="1.5"><polygon points="12,2 15,9 22,9 16.5,14 18.5,22 12,17.5 5.5,22 7.5,14 2,9 9,9"/></svg>
            </div>
            <small>3.2 Ratings</small>
          </div>
        </div>
      </div>
    </div>

    <!-- notes panel -->
    <div class="card notes">
      <h3>Notes and feedback captured</h3>
      <div class="note">
        <div class="dot"></div>
        <div class="nlines"><div class="sk w90"></div><div class="sk w70"></div></div>
        <div class="copy">Copy</div>
      </div>
      <div class="note">
        <div class="dot"></div>
        <div class="nlines"><div class="sk w90"></div><div class="sk w80"></div></div>
        <div class="copy">Copy</div>
      </div>
      <div class="note">
        <div class="dot"></div>
        <div class="nlines"><div class="sk w90"></div><div class="sk w70"></div></div>
        <div class="copy">Copy</div>
      </div>
      <div class="note">
        <div class="dot"></div>
        <div class="nlines"><div class="sk w80"></div><div class="sk w70"></div></div>
        <div class="copy">Copy</div>
      </div>
    </div>

    <!-- process panel -->
    <div class="card process">
      <div class="topRow">
        <h3 style="margin:0">Process tracked</h3>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          <div class="sk" style="width:90px;height:8px"></div>
          <div class="sk" style="width:60px;height:8px"></div>
        </div>
      </div>
      <div class="track"><div class="fill"></div></div>
      <div class="nodes">
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node last">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0e1b16" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/>
          </svg>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
