<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Researcher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap');
  :root {
    --teal:  #17a98b;
    --teal2: #1fc4a6;
    --green: #1f6f4a;
    --green2:#2a8a5c;
    --green3:#3aa873;
    --pink:  #e0526b;
    --pink2: #c93a55;
    --lime:  #a9c84a;
    --text:  #1a2a22;
    --sk:    #cfd6d2;
    --sk2:   #e2e7e3;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: "Open Sans", system-ui, sans-serif; }

  /* ── outer scene ── */
  .scene {
    position: relative;
    width: 780px;
    height: 470px;
    border-radius: 16px;
    border: 1.5px solid var(--pink);
    box-shadow: 0 0 40px rgba(224,82,107,.28), 0 0 90px rgba(224,82,107,.08);
    background:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,.07) 1px, transparent 1px) 0 0/14px 14px,
      linear-gradient(160deg, #03110c 0%, #06190f 100%);
    overflow: hidden;
    isolation: isolate;
    margin: 32px auto;
  }

  /* ── scaled canvas ── */
  .canvas {
    position: absolute;
    top: 0; left: 0;
    width: 1180px;
    height: 720px;
    transform: scale(0.6610);
    transform-origin: 0 0;
  }

  /* ── shared glass card ── */
  .glass {
    background: linear-gradient(160deg, rgba(255,255,255,.97) 0%, rgba(218,232,222,.93) 100%);
    border: 1px solid rgba(255,255,255,.70);
    border-radius: 16px;
    box-shadow:
      0 32px 72px -18px rgba(0,0,0,.62),
      0 8px 24px rgba(0,0,0,.20),
      inset 0 1px 0 rgba(255,255,255,.90);
  }

  /* ── tag chips ── */
  .tag {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px; border-radius: 6px;
    font-size: 11px; font-weight: 700; letter-spacing: .14em;
    color: #fff; text-transform: uppercase;
    box-shadow: 0 4px 14px rgba(0,0,0,.32);
  }
  .tag::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.85); }
  .tag.green { background: linear-gradient(180deg, #2f8a5d, #1a6040); }
  .tag.pink  { background: linear-gradient(180deg, #e0526b, #c93a55); }

  /* ── skeleton shimmer ── */
  .sk {
    border-radius: 6px;
    background: linear-gradient(90deg, var(--sk) 0%, var(--sk2) 50%, var(--sk) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.6s linear infinite;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ════════════════════════════════════
     RESEARCHER TAG
  ════════════════════════════════════ */
  .tag-researcher {
    position: absolute;
    top: 12px; left: 28px;
    z-index: 10;
  }

  /* ════════════════════════════════════
     LEFT PANEL — researcher
  ════════════════════════════════════ */
  .researcher {
    position: absolute;
    top: 55px; left: 20px;
    width: 640px;
    padding: 28px 32px 32px;
    z-index: 2;
  }
  .researcher h2 {
    margin: 0 0 18px;
    font-size: 20px; font-weight: 500;
    color: #6a7a72; line-height: 1.35;
  }

  .input-box {
    background: rgba(255,255,255,.85);
    border: 1px solid rgba(0,0,0,.05);
    border-radius: 10px;
    padding: 18px 18px 18px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.9);
  }
  .input-box .sk        { height: 10px; width: 88%; }
  .input-box .sk + .sk  { margin-top: 10px; width: 62%; }

  .section-title {
    margin: 24px 0 14px;
    color: var(--green2);
    font-size: 17px; font-weight: 700;
  }

  /* candidate rows */
  .row {
    display: grid;
    grid-template-columns: 74px 1fr 1fr;
    gap: 12px; align-items: center;
    background: rgba(255,255,255,.50);
    border: 1px solid rgba(255,255,255,.72);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.04);
  }
  .row:last-child { margin-bottom: 0; }

  .avatar {
    width: 62px; height: 62px; border-radius: 50%;
    background: var(--sk) center/cover no-repeat;
    margin: 0 auto;
    box-shadow: 0 4px 12px rgba(0,0,0,.18);
  }
  .a1{background-image:url('https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=200&h=200&fit=crop&face')}
  .a2{background-image:url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200&h=200&fit=crop&face')}
  .a3{background-image:url('https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=200&h=200&fit=crop&face')}
  .a4{background-image:url('https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=200&h=200&fit=crop&face')}
  .a5{background-image:url('https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200&h=200&fit=crop&face')}
  .a6{background-image:url('https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200&h=200&fit=crop&face')}

  .cell {
    background: rgba(255,255,255,.90);
    border: 1px solid rgba(0,0,0,.04);
    border-radius: 10px;
    padding: 11px 13px;
    display: flex; align-items: center; gap: 10px;
    min-height: 62px; position: relative;
  }
  .check {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--green3);
    color: #fff; display: flex; align-items: center; justify-content: center;
    flex: 0 0 24px;
    box-shadow: 0 2px 6px rgba(0,0,0,.18);
  }
  .check svg { width: 14px; height: 14px; }
  .flag {
    width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
    color: var(--green2); flex: 0 0 22px;
  }
  .sk-stack { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .sk-stack .sk { height: 8px; }
  .sk-stack .sk:nth-child(1) { width: 88%; }
  .sk-stack .sk:nth-child(2) { width: 55%; }

  .badge {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    font-size: 10px; font-weight: 700;
    padding: 5px 11px; border-radius: 6px; color: #fff;
    background: var(--green3); letter-spacing: .03em;
    white-space: nowrap;
  }
  .badge.pink { background: var(--pink); }

  /* ════════════════════════════════════
     RIGHT TOP — filterable fit scores
  ════════════════════════════════════ */
  .scores {
    position: absolute;
    top: 18px; left: 492px;
    width: 516px;
    padding: 22px 24px 20px;
    z-index: 5;
  }
  .scores h3 {
    margin: 0 0 18px;
    font-size: 20px; font-weight: 600; color: #253028;
  }

  .score-row {
    display: grid;
    grid-template-columns: 68px 1fr 28px;
    gap: 14px; align-items: center;
    margin-bottom: 14px;
  }
  .score-row:last-child { margin-bottom: 0; }

  .s-avatar {
    width: 64px; height: 64px; border-radius: 10px;
    background: var(--sk) center/cover no-repeat;
    box-shadow: 0 4px 12px rgba(0,0,0,.18);
  }

  .score-mid { display: flex; flex-direction: column; gap: 8px; }

  .pills { display: flex; gap: 6px; }
  .pill {
    font-size: 10px; font-weight: 700;
    padding: 4px 10px; border-radius: 5px; color: #fff;
    letter-spacing: .03em;
  }
  .pill.high   { background: var(--green3); }
  .pill.mid    { background: var(--lime); color: #3a4a14; }
  .pill.review { background: var(--pink); }

  .bar {
    height: 32px; border-radius: 8px;
    background: rgba(255,255,255,.88);
    border: 1px solid rgba(0,0,0,.05);
    position: relative; overflow: hidden;
  }
  .bar-fill {
    position: absolute; inset: 0 auto 0 0;
    background: linear-gradient(90deg, var(--teal), var(--teal2));
    display: flex; align-items: center; justify-content: flex-end;
    color: #fff; font-weight: 800; font-size: 16px;
    padding-right: 14px; border-radius: 8px 0 0 8px;
    width: 0;
    animation: fillBar 1.4s cubic-bezier(.4,0,.2,1) forwards;
  }
  .bar-fill[data-w="91"]{ --w:91% }
  .bar-fill[data-w="51"]{ --w:51% }
  .bar-fill[data-w="21"]{ --w:21% }
  @keyframes fillBar { from{width:0} to{width:var(--w)} }

  .fi {
    color: var(--green2);
    display: flex; align-items: center; justify-content: center;
  }

  /* ════════════════════════════════════
     RIGHT MID — search operator
  ════════════════════════════════════ */
  .operator {
    position: absolute;
    top: 380px; left: 560px;
    width: 490px;
    padding: 22px 22px 22px 24px;
    display: flex; align-items: center; gap: 18px;
    z-index: 4;
  }
  .op-tag {
    position: absolute;
    top: -20px; left: 22px;
    z-index: 6;
  }
  .op-icon {
    width: 62px; height: 62px; border-radius: 50%;
    background: linear-gradient(160deg, #226644, #0f4228);
    color: #fff; display: flex; align-items: center; justify-content: center;
    flex: 0 0 62px;
    box-shadow: 0 8px 20px rgba(0,0,0,.38);
  }
  .operator p {
    margin: 0; color: #4a5a50;
    font-size: 17px; line-height: 1.4; font-weight: 500;
  }

  /* ════════════════════════════════════
     RIGHT BOTTOM — reasoning details
  ════════════════════════════════════ */
  .reasoning {
    position: absolute;
    top: 510px; left: 560px;
    width: 490px;
    padding: 20px 24px;
    z-index: 4;
  }
  .reasoning h3 {
    margin: 0 0 14px;
    font-size: 18px; font-weight: 600; color: #253028;
  }
  .bullet { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .bullet:last-child { margin-bottom: 0; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--green3); flex: 0 0 10px;
    box-shadow: 0 0 0 3px rgba(58,168,115,.20);
  }
  .bullet .sk { flex: 1; height: 8px; }
</style>
</head>
<body>

<div class="scene">
  <div class="canvas">

    <!-- ── Researcher label ── -->
    <span class="tag green tag-researcher">The Researcher</span>

    <!-- ══════════════════════════════════════
         LEFT PANEL
    ══════════════════════════════════════ -->
    <section class="glass researcher">
      <h2>Here is the candidate shortlist based<br>on your spec</h2>

      <div class="input-box">
        <div class="sk"></div>
        <div class="sk"></div>
      </div>

      <div class="section-title">Mapped Competences</div>

      <!-- row 1 -->
      <div class="row">
        <div class="avatar a1"></div>
        <div class="cell">
          <div class="check">
            <svg viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 7 5.5 10.5 12 3.5"/></svg>
          </div>
          <div class="sk-stack"><div class="sk"></div><div class="sk"></div></div>
        </div>
        <div class="cell">
          <div class="flag">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1zM4 22v-7"/></svg>
          </div>
          <div class="sk-stack"><div class="sk"></div></div>
          <span class="badge">Perfect Fit</span>
        </div>
      </div>

      <!-- row 2 -->
      <div class="row">
        <div class="avatar a2"></div>
        <div class="cell">
          <div class="check">
            <svg viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 7 5.5 10.5 12 3.5"/></svg>
          </div>
          <div class="sk-stack"><div class="sk"></div><div class="sk"></div></div>
        </div>
        <div class="cell">
          <div class="flag">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1zM4 22v-7"/></svg>
          </div>
          <div class="sk-stack"><div class="sk"></div></div>
          <span class="badge">Perfect Fit</span>
        </div>
      </div>

      <!-- row 3 -->
      <div class="row">
        <div class="avatar a3"></div>
        <div class="cell">
          <div class="check">
            <svg viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 7 5.5 10.5 12 3.5"/></svg>
          </div>
          <div class="sk-stack"><div class="sk"></div><div class="sk"></div></div>
        </div>
        <div class="cell">
          <div class="flag">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1zM4 22v-7"/></svg>
          </div>
          <div class="sk-stack"><div class="sk"></div></div>
          <span class="badge pink">Perfect Fit</span>
        </div>
      </div>
    </section>

    <!-- ══════════════════════════════════════
         FILTERABLE FIT SCORES
    ══════════════════════════════════════ -->
    <section class="glass scores">
      <h3>Filterable fit scores</h3>

      <div class="score-row">
        <div class="s-avatar a4"></div>
        <div class="score-mid">
          <div class="pills">
            <span class="pill high">High</span>
            <span class="pill mid">Mid</span>
            <span class="pill review">Review</span>
          </div>
          <div class="bar"><div class="bar-fill" data-w="91" style="--w:91%">91%</div></div>
        </div>
        <div class="fi">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M4.25 5.61C6.27 8.2 10 13 10 13v6c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-6s3.72-4.8 5.74-7.39A1 1 0 0 0 18.95 4H5.04a1 1 0 0 0-.79 1.61z"/></svg>
        </div>
      </div>

      <div class="score-row">
        <div class="s-avatar a5"></div>
        <div class="score-mid">
          <div class="pills">
            <span class="pill high">High</span>
            <span class="pill mid">Mid</span>
            <span class="pill review">Review</span>
          </div>
          <div class="bar"><div class="bar-fill" data-w="51" style="--w:51%">51%</div></div>
        </div>
        <div class="fi">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M4.25 5.61C6.27 8.2 10 13 10 13v6c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-6s3.72-4.8 5.74-7.39A1 1 0 0 0 18.95 4H5.04a1 1 0 0 0-.79 1.61z"/></svg>
        </div>
      </div>

      <div class="score-row">
        <div class="s-avatar a6"></div>
        <div class="score-mid">
          <div class="pills">
            <span class="pill high">High</span>
            <span class="pill mid">Mid</span>
            <span class="pill review">Review</span>
          </div>
          <div class="bar"><div class="bar-fill" data-w="21" style="--w:21%">21%</div></div>
        </div>
        <div class="fi">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M4.25 5.61C6.27 8.2 10 13 10 13v6c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-6s3.72-4.8 5.74-7.39A1 1 0 0 0 18.95 4H5.04a1 1 0 0 0-.79 1.61z"/></svg>
        </div>
      </div>
    </section>

    <!-- ══════════════════════════════════════
         SEARCH OPERATOR
    ══════════════════════════════════════ -->
    <section class="glass operator">
      <span class="tag pink op-tag">Search Operator</span>
      <div class="op-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20v-1a6 6 0 0 1 6-6h2"/>
          <circle cx="19" cy="19" r="3"/>
          <path d="M19 16v1M19 22v-1M22 19h-1M16 19h1"/>
        </svg>
      </div>
      <p>Ensuring all candidates<br>meet your talent strategy</p>
    </section>

    <!-- ══════════════════════════════════════
         REASONING DETAILS
    ══════════════════════════════════════ -->
    <section class="glass reasoning">
      <h3>Reasoning Details</h3>
      <div class="bullet"><span class="dot"></span><div class="sk"></div></div>
      <div class="bullet"><span class="dot"></span><div class="sk"></div></div>
    </section>

  </div><!-- /canvas -->
</div><!-- /scene -->

</body>
</html>
