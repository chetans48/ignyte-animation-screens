<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Researcher</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .ignyte3-scaler {
      width: 100%;
      max-width: 458px;
      aspect-ratio: 458 / 400;
      position: relative;
      overflow: hidden;
    }

    .ignyte3-scaler>.scene {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
    }

    .sk {
      background: linear-gradient(90deg, #dfe5e3 0%, #eef2f0 50%, #dfe5e3 100%) !important;
      background-size: 200% 100% !important;
      animation: shimmer 1.5s infinite linear !important;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    /* Fix Tag Positioning */
    .tag-researcher {
      position: absolute;
      top: 24px;
      /* Align just above the white box */
      left: 50px;
      /* Align with the left edge of the white box */
      background: #0f8e72;
      color: white;
      padding: 6px 10px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
      z-index: 10;
    }

    .tag-researcher::before {
      content: "";
      display: block;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
    }

    /* Fix Bar Fill Animation & Color */
    .screen-researcher .bar-fill {
      background: linear-gradient(90deg, #1aa480, #36d29b) !important;
      /* Gradient green */
      border-radius: 6px !important;
      animation: none !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      font-size: 26px !important;
      font-weight: 700 !important;
      padding: 0 !important;
      transition: width 0.05s linear;
      white-space: nowrap;
    }

    /* Avatar Overlaps - REMOVED to keep avatars inside containers */
    .screen-researcher .avatar {
      /* Removed negative margins */
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15) !important;
    }

    .screen-researcher .s-avatar {
      /* Removed negative margins */
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15) !important;
    }

    /* Fix Pills Colors */
    .screen-researcher .pill.high {
      background: linear-gradient(90deg, #0d8368, #119f7e) !important;
    }

    /* Gradient green */
    .screen-researcher .pill.mid {
      background: #abc93c !important;
      color: white !important;
    }

    .screen-researcher .pill.review {
      background: #ef3c69 !important;
    }

    /* Mapped Competencies Alignment & Styles */
    .screen-researcher .cell {
      border: 1.5px solid rgba(255, 255, 255, 0.9) !important;
      background: rgba(255, 255, 255, 0.6) !important;
      box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.7), 0 2px 6px rgba(0, 0, 0, 0.03) !important;
      display: flex !important;
      flex-direction: column !important;
      gap: 12px !important;
      padding: 12px 14px !important;
      /* Restore vertical centering */
    }

    .screen-researcher .cell .sk {
      height: 10px !important;
      border-radius: 5px !important;
      margin: 0 !important;
    }

    .screen-researcher .sk-stack {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px !important;
    }

    .screen-researcher .sk-stack .sk:nth-child(1) {
      width: 35px !important;
    }

    .screen-researcher .sk-stack .sk:nth-child(2) {
      width: 85% !important;
    }

    .screen-researcher .check {
      background: linear-gradient(135deg, #0dc898 0%, #b8f029 100%) !important;
      border: none !important;
      width: 22px !important;
      height: 22px !important;
      flex: 0 0 22px !important;
    }

    .screen-researcher .check svg {
      width: 12px !important;
      height: 12px !important;
    }

    /* Perfect fit badge alignment */
    .screen-researcher .badge:not(.pink) {
      background: #19d6aa !important;
      color: #0c3327 !important;
      font-weight: 600 !important;
      font-size: 8px !important;
      /* Smaller text */
      padding: 4px 8px !important;
      /* Tighter padding */
      border-radius: 4px !important;
    }

    .screen-researcher .badge.pink {
      font-size: 8px !important;
      padding: 4px 8px !important;
      border-radius: 4px !important;
    }

    /* Filterable Fit Scores Layout Fixes */
    .screen-researcher .score-row {
      display: block !important;
      position: relative !important;
      padding-left: 82px !important;
      min-height: 80px !important;
      margin-bottom: 24px !important;
    }

    .screen-researcher .score-row .s-avatar {
      position: absolute !important;
      left: 0 !important;
      top: 50% !important;
      transform: translateY(-50%) !important;
      margin: 0 !important;
    }

    .screen-researcher .score-row .fi {
      position: absolute !important;
      top: 0 !important;
      right: 0 !important;
    }

    .screen-researcher .score-row .score-mid {
      display: flex !important;
      flex-direction: column !important;
      gap: 12px !important;
      /* More space between pills and bar */
      width: 100% !important;
    }
  </style>
</head>

  <script>
    (function () {
      var scaler = document.querySelector('.ignyte3-scaler');
      var scene = scaler.querySelector('.scene');
      function resize() {
        scene.style.transform = 'scale(' + (scaler.offsetWidth / 458) + ')';
      }
      resize();
      window.addEventListener('resize', resize);

      // Animate bars
      var bars = document.querySelectorAll('.bar-fill');

      function animateBars() {
        bars.forEach(function (bar) {
          var target = parseInt(bar.getAttribute('data-w'), 10);
          bar.style.transition = 'none'; // reset transition for snap back
          bar.style.width = '0%';
          bar.textContent = '0%';

          var current = 0;
          var duration = 1500; // 1.5s total

          setTimeout(function () {
            bar.style.transition = 'width 0.1s linear';
            var interval = setInterval(function () {
              current += target / (duration / 50); // 50ms interval
              if (current >= target) {
                current = target;
                clearInterval(interval);
              }
              bar.style.width = current + '%';
              bar.textContent = Math.floor(current) + '%';
            }, 50);
          }, 100);
        });
      }

      // Initial run
      setTimeout(animateBars, 200);

      // Loop every 4 seconds
      setInterval(animateBars, 4000);
    })();
  </script>
