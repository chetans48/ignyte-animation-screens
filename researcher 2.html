<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Researcher</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #080d11;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 50px;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(0,200,130,0.11) 1px, transparent 1px);
    background-size: 22px 22px;
    pointer-events: none;
    z-index: 0;
  }

  .scene {
    position: relative;
    width: 900px;
    height: 720px;
    z-index: 1;
  }

  /* Outer border frame */
  .outer-card {
    position: absolute;
    top: 26px; left: 0;
    border: 1.5px solid rgba(210,25,75,0.55);
    border-radius: 18px;
    width: 800px;
    height: 630px;
    background: transparent;
    z-index: 2;
  }

  /* BADGES */
  .badge-researcher {
    position: absolute;
    top: 12px; left: 28px; z-index: 20;
    display: inline-flex; align-items: center; gap: 6px;
    background: #185e47; color: #fff;
    font-size: 10px; font-weight: 800; letter-spacing: 1.4px;
    text-transform: uppercase; padding: 5px 13px;
    border-radius: 5px;
  }
  .badge-so {
    position: absolute;
    top: 468px; right: 64px; z-index: 20;
    display: inline-flex; align-items: center; gap: 6px;
    background: #b81e56; color: #fff;
    font-size: 10px; font-weight: 800; letter-spacing: 1.4px;
    text-transform: uppercase; padding: 5px 12px;
    border-radius: 5px;
  }

  /* LEFT PANEL */
  .left-panel {
    position: absolute;
    top: 56px; left: 18px;
    width: 388px;
    background: linear-gradient(155deg, #dff0e8 0%, #c4dfd0 100%);
    border-radius: 14px;
    padding: 24px 20px 20px;
    z-index: 5;
  }
  .chat-text { color: #5a5a5a; font-size: 14px; line-height: 1.56; margin-bottom: 14px; }
  .chat-line { height: 8px; background: #bcbcbc; border-radius: 20px; margin-bottom: 7px; }
  .comp-title { color: #2daa7a; font-size: 18px; font-weight: 700; margin: 18px 0 12px; }
  
  /* Candidate card - has a 2-column layout inside */
  .cand-card {
    background: #fff; border-radius: 10px;
    padding: 11px 13px;
    display: flex; align-items: center; gap: 11px;
    margin-bottom: 9px;
    box-shadow: 0 1px 7px rgba(0,0,0,0.08);
  }
  .cphoto { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .cinfo { flex: 1; min-width: 0; }
  .chk {
    width: 20px; height: 20px; background: #2daa7a;
    border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 6px;
  }
  .il { height: 6px; background: #e0e0e0; border-radius: 20px; margin-bottom: 5px; }
  .cdivider { width: 1px; height: 44px; background: #e8e8e8; flex-shrink: 0; }
  .cright { display: flex; flex-direction: column; gap: 7px; min-width: 100px; padding-left: 8px; }
  .flag-pf { display: flex; align-items: center; gap: 7px; }
  .pf { background: #e84448; color: #fff; font-size: 9px; font-weight: 700; padding: 3px 7px; border-radius: 4px; white-space: nowrap; }

  /* FIT SCORES */
  .fit-panel {
    position: absolute;
    top: 0; right: 0;
    width: 365px;
    background: linear-gradient(155deg, #dff0e8 0%, #c4dfd0 100%);
    border-radius: 14px;
    padding: 20px 18px;
    z-index: 8;
    box-shadow: 0 12px 45px rgba(0,0,0,0.38);
  }
  .fit-title { font-size: 17px; font-weight: 600; color: #1e1e1e; margin-bottom: 16px; }
  .fit-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 13px; }
  .fphoto { width: 64px; height: 64px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
  .fright { flex: 1; }
  .ftags { display: flex; gap: 4px; margin-bottom: 7px; align-items: center; }
  .tag { font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 4px; color: #fff; }
  .th { background: #2daa7a; }
  .tm { background: #a3b418; }
  .tr { background: #e84448; }
  .tfunnel { margin-left: auto; }
  .fbar-bg { background: rgba(145,200,178,0.38); border-radius: 6px; overflow: hidden; }
  .fbar {
    background: #2daa7a; color: #fff;
    font-size: 15px; font-weight: 700;
    border-radius: 6px; padding: 6px 11px;
    display: block;
  }

  /* SEARCH OPERATOR PANEL */
  .so-panel {
    position: absolute;
    top: 500px; right: 0;
    width: 315px;
    background: #182b24;
    border-radius: 12px;
    padding: 16px 18px;
    display: flex; align-items: center; gap: 15px;
    z-index: 8;
    box-shadow: 0 8px 32px rgba(0,0,0,0.38);
  }
  .so-icon-wrap {
    width: 48px; height: 48px;
    background: #0c1e17;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 1.5px solid rgba(45,170,122,0.28);
  }
  .so-text { color: #cce8df; font-size: 14.5px; font-weight: 500; line-height: 1.45; }

  /* REASONING PANEL */
  .reason-panel {
    position: absolute;
    top: 588px; right: 0;
    width: 315px;
    background: linear-gradient(155deg, #dff0e8 0%, #c4dfd0 100%);
    border-radius: 14px;
    padding: 18px 17px;
    z-index: 8;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .rtitle { font-size: 17px; font-weight: 600; color: #1e1e1e; margin-bottom: 13px; }
  .ritem { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 11px; }
  .rdot { width: 9px; height: 9px; background: #2daa7a; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .rl { height: 6px; background: #a0c0b4; border-radius: 20px; margin-bottom: 5px; }
</style>
</head>
<body>
<div class="scene">

  <!-- OUTER BORDER FRAME -->
  <div class="outer-card"></div>

  <!-- "THE RESEARCHER" BADGE -->
  <div class="badge-researcher">
    <span style="color:#7fffd4;font-size:15px;line-height:1">•</span> THE RESEARCHER
  </div>

  <!-- LEFT CHAT + COMPETENCES PANEL -->
  <div class="left-panel">
    <p class="chat-text">Here is the candidate shortlist based on your spec</p>
    <div class="chat-line" style="width:84%"></div>
    <div class="chat-line" style="width:56%"></div>

    <div class="comp-title">Mapped Competences</div>

    <!-- Candidate 1: woman with curly dark hair -->
    <div class="cand-card">
      <img class="cphoto" src="https://randomuser.me/api/portraits/women/44.jpg" alt="">
      <div class="cinfo">
        <div class="chk">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
            <path d="M2 5.5l2.5 2.5 4.5-4.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
        <div class="il" style="width:86%"></div>
        <div class="il" style="width:65%"></div>
        <div class="il" style="width:48%"></div>
      </div>
      <div class="cdivider"></div>
      <div class="cright">
        <div class="flag-pf">
          <svg width="13" height="15" viewBox="0 0 13 15" fill="none">
            <path d="M2.2 1v13M2.2 1h8.5L8.3 4.4l2.4 3.6H2.2" stroke="#2daa7a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <div class="pf">Perfect Fit</div>
        </div>
        <div class="il" style="width:80%; margin:0;"></div>
        <div class="il" style="width:60%; margin:0;"></div>
      </div>
    </div>

    <!-- Candidate 2: man with beard -->
    <div class="cand-card">
      <img class="cphoto" src="https://randomuser.me/api/portraits/men/32.jpg" alt="">
      <div class="cinfo">
        <div class="chk">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
            <path d="M2 5.5l2.5 2.5 4.5-4.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
        <div class="il" style="width:86%"></div>
        <div class="il" style="width:65%"></div>
        <div class="il" style="width:48%"></div>
      </div>
      <div class="cdivider"></div>
      <div class="cright">
        <div class="flag-pf">
          <svg width="13" height="15" viewBox="0 0 13 15" fill="none">
            <path d="M2.2 1v13M2.2 1h8.5L8.3 4.4l2.4 3.6H2.2" stroke="#2daa7a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <div class="pf">Perfect Fit</div>
        </div>
        <div class="il" style="width:80%; margin:0;"></div>
        <div class="il" style="width:60%; margin:0;"></div>
      </div>
    </div>

    <!-- Candidate 3: young blonde woman -->
    <div class="cand-card">
      <img class="cphoto" src="https://randomuser.me/api/portraits/women/65.jpg" alt="">
      <div class="cinfo">
        <div class="chk">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
            <path d="M2 5.5l2.5 2.5 4.5-4.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
        <div class="il" style="width:86%"></div>
        <div class="il" style="width:65%"></div>
        <div class="il" style="width:48%"></div>
      </div>
      <div class="cdivider"></div>
      <div class="cright">
        <div class="flag-pf">
          <svg width="13" height="15" viewBox="0 0 13 15" fill="none">
            <path d="M2.2 1v13M2.2 1h8.5L8.3 4.4l2.4 3.6H2.2" stroke="#2daa7a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <div class="pf">Perfect Fit</div>
        </div>
        <div class="il" style="width:80%; margin:0;"></div>
        <div class="il" style="width:60%; margin:0;"></div>
      </div>
    </div>
  </div>

  <!-- FIT SCORES PANEL (overlapping outer card at top-right) -->
  <div class="fit-panel">
    <div class="fit-title">Filterable fit scores</div>

    <!-- 91% -->
    <div class="fit-row">
      <img class="fphoto" src="https://randomuser.me/api/portraits/women/55.jpg" alt="">
      <div class="fright">
        <div class="ftags">
          <span class="tag th">High</span>
          <span class="tag tm">Mid</span>
          <span class="tag tr">Review</span>
          <span class="tfunnel">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path d="M1.5 2h12l-4.5 5.5V13l-3-1.5V7.5z" stroke="#2daa7a" stroke-width="1.3" stroke-linejoin="round"></path>
            </svg>
          </span>
        </div>
        <div class="fbar-bg"><div class="fbar" style="width:100%">91%</div></div>
      </div>
    </div>

    <!-- 51% -->
    <div class="fit-row">
      <img class="fphoto" src="https://randomuser.me/api/portraits/men/45.jpg" alt="">
      <div class="fright">
        <div class="ftags">
          <span class="tag th">High</span>
          <span class="tag tm">Mid</span>
          <span class="tag tr">Review</span>
          <span class="tfunnel">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path d="M1.5 2h12l-4.5 5.5V13l-3-1.5V7.5z" stroke="#2daa7a" stroke-width="1.3" stroke-linejoin="round"></path>
            </svg>
          </span>
        </div>
        <div class="fbar-bg"><div class="fbar" style="width:56%">51%</div></div>
      </div>
    </div>

    <!-- 21% -->
    <div class="fit-row">
      <img class="fphoto" src="https://randomuser.me/api/portraits/women/33.jpg" alt="">
      <div class="fright">
        <div class="ftags">
          <span class="tag th">High</span>
          <span class="tag tm">Mid</span>
          <span class="tag tr">Review</span>
          <span class="tfunnel">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path d="M1.5 2h12l-4.5 5.5V13l-3-1.5V7.5z" stroke="#2daa7a" stroke-width="1.3" stroke-linejoin="round"></path>
            </svg>
          </span>
        </div>
        <div class="fbar-bg"><div class="fbar" style="width:24%">21%</div></div>
      </div>
    </div>
  </div>

  <!-- "SEARCH OPERATOR" BADGE -->
  <div class="badge-so">
    <span style="color:#ffaac0;font-size:15px;line-height:1">•</span> SEARCH OPERATOR
  </div>

  <!-- SEARCH OPERATOR PANEL -->
  <div class="so-panel">
    <div class="so-icon-wrap">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
        <!-- gear/search icon -->
        <circle cx="11" cy="11" r="6.5" stroke="#2daa7a" stroke-width="1.5"></circle>
        <path d="M16 16l4 4" stroke="#2daa7a" stroke-width="2" stroke-linecap="round"></path>
        <circle cx="11" cy="11" r="3" fill="rgba(45,170,122,0.2)" stroke="#2daa7a" stroke-width="1.3"></circle>
        <!-- rays -->
        <path d="M11 4.5V3M11 19v-1.5M4.5 11H3M19 11h-1.5M6.44 6.44L5.4 5.4M16.6 16.6l-1.04-1.04M6.44 15.56L5.4 16.6M16.6 5.4l-1.04 1.04" stroke="#2daa7a" stroke-width="1.1" stroke-linecap="round"></path>
      </svg>
    </div>
    <div class="so-text">Ensuring all candidates meet your talent strategy</div>
  </div>

  <!-- REASONING DETAILS PANEL -->
  <div class="reason-panel">
    <div class="rtitle">Reasoning Details</div>
    <div class="ritem">
      <div class="rdot"></div>
      <div style="flex:1">
        <div class="rl" style="width:100%"></div>
        <div class="rl" style="width:68%"></div>
      </div>
    </div>
    <div class="ritem">
      <div class="rdot"></div>
      <div style="flex:1">
        <div class="rl" style="width:85%"></div>
        <div class="rl" style="width:60%"></div>
      </div>
    </div>
  </div>

</div>

</body></html>
